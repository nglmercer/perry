# Parity-test skiplist.
#
# Drives `scripts/gen_parity_tests.py` and (downstream) the parity sweep.
# Two tables: `skip-modules` excludes a whole `node:<name>` module from
# generation; `skip-apis` excludes individual API rows from the test
# files but otherwise leaves the module intact.
#
# Every entry MUST have a one-line reason explaining why parity isn't
# pursued. Reasons that boil down to "we haven't gotten to it yet" do
# NOT belong here — those are open gaps and stay in the test file as
# TODO lines so the parity diff drives them to resolution.
#
# Three legitimate categories of skip:
#
# 1. Architectural — the API requires a JS interpreter at runtime
#    (eval, Function constructor, vm.runInThisContext, dynamic
#    import()) and Perry compiles ahead of time. There is no
#    semantically correct AOT implementation.
#
# 2. Out-of-scope — the API targets something Perry doesn't model
#    (V8 internals, the Node inspector protocol, the legacy domain
#    error system, REPL interactivity). Implementing it would mean
#    reimplementing a different runtime.
#
# 3. Non-deterministic / environment-dependent — the API returns
#    values that legitimately differ between runs (process.pid,
#    Date.now standalone, fs.watch event timing) so byte-for-byte
#    parity comparison is not the right test shape.
#
# NOTE on skiplist vs API manifest (#3700): a skiplisted module/API can
# still appear in `--print-api-manifest`, and that is NOT a conflict.
# The two sources measure different axes: the manifest records whether an
# API *exists and is callable* in Perry; this skiplist records whether the
# API is a *byte-for-byte parity target*. A module is correctly skiplisted
# (one of the three categories above) even while the manifest claims it —
# e.g. `v8` is implemented and callable, but its surface is not
# byte-matchable against Node (see its reason below). Triage rule: a
# failure on a skiplisted-but-manifest-claimed API is bucketed as `Skip`,
# not as a manifest/runtime gap.

[skip-modules]
# Out-of-scope — interactive / V8-specific / deprecated.
"repl" = "Interactive REPL; not meaningful for AOT-compiled binaries."
"inspector" = "V8 inspector protocol; Perry is not V8."
"inspector/promises" = "V8 inspector protocol; Perry is not V8."
"trace_events" = "V8 trace events; not applicable to native binaries."

# Out-of-scope — Node implementation internals, not public userland modules.
"_http_agent" = "Internal Node implementation module; not public userland API."
"_http_client" = "Internal Node implementation module; not public userland API."
"_http_common" = "Internal Node implementation module; not public userland API."
"_http_incoming" = "Internal Node implementation module; not public userland API."
"_http_outgoing" = "Internal Node implementation module; not public userland API."
"_http_server" = "Internal Node implementation module; not public userland API."
"_stream_duplex" = "Internal Node implementation module; not public userland API."
"_stream_passthrough" = "Internal Node implementation module; not public userland API."
"_stream_readable" = "Internal Node implementation module; not public userland API."
"_stream_transform" = "Internal Node implementation module; not public userland API."
"_stream_wrap" = "Internal Node implementation module; not public userland API."
"_stream_writable" = "Internal Node implementation module; not public userland API."
"_tls_common" = "Internal Node implementation module; not public userland API."
"_tls_wrap" = "Internal Node implementation module; not public userland API."

# Implemented and manifest-claimed, but not byte-parity-testable: serialize/
# deserialize use the JSC wire format (Perry isn't V8, so the bytes differ from
# Node's V8 format), and getHeapStatistics/getHeapSpaceStatistics/
# getHeapCodeStatistics/cachedDataVersionTag return runtime-specific values
# (categories 2 + 3). Roundtrips and shapes work; byte-for-byte diffing does not.
"v8" = "V8-specific introspection + JSC-format serialization; callable but not byte-parity-testable (see #3700)."

# Out-of-scope test surface.
"test/mock" = "Test-runner mocking; covered transitively by node:test if pursued."

[skip-apis]
