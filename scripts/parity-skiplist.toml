"module.error" = "Experimental VM module state remains gated/open (#3132)."
"module.identifier" = "Experimental VM module state remains gated/open (#3132)."
"module.namespace" = "Experimental VM module namespace remains gated/open (#3132)."
"module.status" = "Experimental VM module state remains gated/open (#3132)."
"module.evaluate([options])" = "Experimental VM module evaluation remains gated/open (#3132)."
"module.link(linker)" = "Experimental VM module linking remains gated/open (#3132)."
"new vm.SourceTextModule(code[, options])" = "Experimental VM module constructor remains gated/open (#3132)."
"dependencySpecifiers" = "SourceTextModule dependency metadata remains gated/open (#3322)."
"moduleRequests" = "SourceTextModule module request helpers remain gated/open (#3322)."
"hasAsyncGraph()" = "SourceTextModule graph helper remains gated/open (#3132)."
"hasTopLevelAwait()" = "SourceTextModule graph helper remains gated/open (#3132)."
"instantiate()" = "SourceTextModule instantiation remains gated/open (#3132)."
"linkRequests(modules)" = "SourceTextModule request linking remains gated/open (#3132/#3322)."
"new vm.SyntheticModule(exportNames, evaluateCallback[, options])" = "Experimental SyntheticModule constructor remains gated/open (#3133)."
"setExport(name, value)" = "SyntheticModule export mutation remains gated/open (#3133)."
"vm.measureMemory([options])" = "V8 heap measurement remains open/inapplicable (#3284)."
"util.compileFunction(...)" = "Same as vm.compileFunction — needs JS interpreter."

# Out-of-scope — native addons / V8 internals.
"process.dlopen(module, filename[, flags])" = "Loads Node native (.node) addons; Perry has its own native-library system (perry-ext-*)."
"process.binding(name)" = "Internal Node binding access; not part of public surface."
"process._linkedBinding(name)" = "Internal Node binding access; not part of public surface."

# Non-deterministic / environment-dependent — wrong test shape for byte parity.
"process.pid" = "Per-run PID — shape-tested elsewhere, not byte-comparable."
"process.ppid" = "Parent PID — shape-tested elsewhere, not byte-comparable."
"process.uptime()" = "Wall-clock uptime — shape-tested elsewhere."
"process.hrtime([time])" = "Monotonic clock — non-deterministic value."
"process.hrtime.bigint()" = "Monotonic clock (bigint) — non-deterministic value."
"process.cpuUsage([previousValue])" = "Per-run CPU counters — shape-tested elsewhere."
"process.memoryUsage()" = "Per-run memory counters — shape-tested elsewhere."
"process.memoryUsage.rss()" = "Per-run RSS — shape-tested elsewhere."
"process.resourceUsage()" = "Per-run rusage counters — shape-tested elsewhere."
"process.exit([code])" = "Terminates the process; would short-circuit the rest of the parity test."
"process.abort()" = "SIGABRT; would terminate the parity test."
"process.kill(pid[, signal])" = "Sends signals; not deterministic in a parity diff."

