[package]
name = "perry-ui-windows"
version.workspace = true
edition.workspace = true

[lib]
crate-type = ["rlib", "staticlib"]

[dependencies]
perry-ui = { path = "../perry-ui" }
perry-ui-testkit = { workspace = true }
perry-audio-miniaudio = { workspace = true }
perry-runtime = { path = "../perry-runtime", default-features = false, features = ["stdlib"] }
base64 = "0.22"
libc = "0.2"
# Proper PNG encoder (deflate). The old inline encoder wrote stored blocks
# → 2.7 MB baseline for a 900×788 window. With real compression: ~50 KB.
png = "0.17"
# Pure-Rust QR code generator for the qrcode widget (GDI bitmap path).
# macOS/iOS/tvOS use CIFilter("CIQRCodeGenerator"); Android uses zxing-android-embedded;
# GTK4 stub. Windows path renders the matrix into a 32bpp DIB and BitBlt's it onto
# a custom STATIC child window during WM_PAINT.
qrcodegen = "1.8"
# WebView2 — issue #658 Phase 2 Windows backend. CoreWebView2 controller
# parented to a host HWND with sync-pumped init via WebView2's async
# completion-handler callbacks. WebView2 Runtime ships with Windows 11
# by default and as a redistributable on Windows 10 1803+.
# webview2-com 0.34.x is the last release that uses windows 0.58 (matches
# the rest of perry-ui-windows). 0.35+ moved to windows 0.59+ which would
# clash with our HWND/PCWSTR types.
webview2-com = "=0.34"

[features]
geisterhand = []

[target.'cfg(target_os = "windows")'.dependencies]
# The `#[implement]` macro from `windows` 0.58 expands to absolute
# `::windows_core::` paths, so the consuming crate must depend on
# `windows-core` directly or the COM authoring in drag_drop.rs fails to
# resolve `windows_core` (E0433). Pinned to 0.58 to match `windows`.
windows-core = "0.58"
windows = { version = "0.58", features = [
    # `#[implement]` — needed to author the IDropTarget / IDropSource /
    # IDataObject COM objects for native drag-and-drop (#4773).
    "implement",
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Controls",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_System_DataExchange",
    "Win32_System_Ole",
    "Win32_System_Com",
    # STGMEDIUM / IDataObject marshalling for native drag-and-drop (#4773).
    "Win32_System_Com_StructuredStorage",
    "Win32_System_Memory",
    "Win32_System_SystemServices",
    "Win32_UI_HiDpi",
    "Win32_UI_Shell",
    "Win32_UI_Shell_Common",
    "Win32_UI_HiDpi",
    "Win32_System_Registry",
    "Win32_Storage_Xps",
    "Win32_Media_Audio",
    "Win32_System_Threading",
    "Win32_System_SystemInformation",
    "Win32_Graphics_GdiPlus",
    # perry/media — Windows.Media.Playback.MediaPlayer (winrt) for streaming
    # audio playback (#351).
    "Media_Playback",
    "Media_Core",
    "Foundation",
    # SystemMediaTransportControls / DisplayUpdater / MusicDisplayProperties
    # (#367 — volume HUD media tile, headphone media keys, Edge Now Playing).
    "Media",
    "Storage_Streams",
    # WinHTTP — URL-fetched images on Windows (Image(url, alt) +
    # ImageGallery URLs). Mirrors the macOS NSURL/NSData path: native
    # OS HTTP client, no extra Rust deps. WinHttpOpen / Connect /
    # OpenRequest / SendRequest / ReceiveResponse / ReadData chain
    # runs on a background thread; bytes are decoded via GDI+
    # GdipLoadImageFromStream on the main thread during WM_PAINT.
    "Win32_Networking_WinHttp",
] }
